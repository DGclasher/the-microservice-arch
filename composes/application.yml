services:
  mysql-db:
    container_name: microservice-mysql
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password
    expose:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - micro-mysql-data:/var/lib/mysql
    networks:
      - the-microservice-arch

  mongodb:
    container_name: microservice-mongo
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: dbmongo
    expose:
      - "27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - micro-mongo-data:/data/db
    networks:
      - the-microservice-arch

  kafka:
    image: apache/kafka:3.9.1
    container_name: micro-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - micro-kafka-data:/var/lib/kafka/data
    networks:
      - the-microservice-arch

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: microservice-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - the-microservice-arch

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.5
    container_name: microservice-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: keycloak
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8181
    ports:
      - "8181:8181"
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks:
      - the-microservice-arch

  discovery-server:
    image: dgclasher/discovery-server:latest
    container_name: discovery-server
    restart: unless-stopped
    expose:
      - "8761"
    environment:
      EUREKA_INSTANCE_HOSTNAME: discovery-server
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    networks:
      - the-microservice-arch

  api-gateway:
    image: dgclasher/api-gateway:latest
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@discovery-server:8761/eureka
      DISCOVERY_SERVER_URI: http://discovery-server:8761
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8181/realms/springboot-microservices-realm
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      - discovery-server
      - keycloak
    networks:
      - the-microservice-arch

  inventory-service:
    image: dgclasher/inventory-service:latest
    container_name: inventory-service
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@discovery-server:8761/eureka
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      mysql-db:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - the-microservice-arch

  notification-service:
    image: dgclasher/notification-service:latest
    container_name: notification-service
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SERVER_PORT: 8080
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@discovery-server:8761/eureka
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - the-microservice-arch

  order-service:
    image: dgclasher/order-service:latest
    container_name: order-service
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@discovery-server:8761/eureka
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      mysql-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - the-microservice-arch

  product-service:
    image: dgclasher/product-service:latest
    container_name: product-service
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_MONGODB_HOST: mongodb
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:password@discovery-server:8761/eureka
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      mongodb:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - the-microservice-arch

  prometheus:
    image: prom/prometheus:latest
    container_name: microservice-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    depends_on:
      - product-service
      - inventory-service
      - notification-service
      - order-service
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - the-microservice-arch

  grafana:
    image: grafana/grafana:latest
    container_name: microservice-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    links:
      - prometheus:prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - the-microservice-arch

networks:
  the-microservice-arch:
    driver: bridge

volumes:
  micro-mysql-data:
  micro-mongo-data:
  micro-kafka-data:
  keycloak-data:
  grafana-data:
  prometheus-data:
